<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valeriy Grachev — Photography & DevOps</title>
<meta name="description" content="Valeriy Grachev — Editorial & documentary photographer and DevOps Lead & Platform Engineer specializing in crypto trading infrastructure.">
<meta property="og:title" content="Valeriy Grachev — Photography & DevOps">
<meta property="og:description" content="Editorial & documentary photographer and DevOps Lead & Platform Engineer.">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   RESET & VARIABLES
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --dark-bg: #060606;
  --dark-text: #e8e4df;
  --dark-text-dim: #9a968f;
  --light-bg: #f5f3f0;
  --light-text: #1a1a1a;
  --light-text-dim: #6b6862;
  --accent: #8b6f4e;
  --accent-light: #b89b70;
  --serif: 'Cormorant Garamond', 'Georgia', serif;
  --sans: 'DM Sans', 'Helvetica Neue', sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  margin: 0;
  overflow: hidden;
  font-family: var(--sans);
  font-weight: 300;
}

::selection {
  background: var(--accent);
  color: #fff;
}

a {
  color: inherit;
  text-decoration: none;
}

/* ============================================
   LOADER
   ============================================ */
.loader {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--dark-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 1s var(--ease), visibility 1s var(--ease);
}

.loader.is-hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.loader__mark {
  font-family: var(--serif);
  font-size: 0.85rem;
  font-weight: 400;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--accent);
  animation: loaderPulse 2s ease-in-out infinite;
}

@keyframes loaderPulse {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 1; }
}

/* ============================================
   MAIN CONTAINER
   ============================================ */
.split {
  display: flex;
  width: 100vw;
  height: 100vh;
  height: 100svh;
  position: relative;
}

/* ============================================
   SHARED HALF STYLES
   ============================================ */
.half {
  position: relative;
  width: 50%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  text-decoration: none;
}

.half__inner {
  position: relative;
  z-index: 5;
  text-align: center;
  pointer-events: none;
}

/* ============================================
   FILM GRAIN OVERLAY — shared across both
   ============================================ */
.grain {
  position: fixed;
  inset: 0;
  z-index: 50;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
}

/* ============================================
   LEFT HALF — PHOTOGRAPHY (DARK)
   ============================================ */
.half--photo {
  background: var(--dark-bg);
  color: var(--dark-text);
}

.half--photo .half__bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.half--photo .half__bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 30%;
  display: block;
}

.half--photo .half__scrim {
  position: absolute;
  inset: 0;
  z-index: 1;
  background:
    linear-gradient(180deg,
      rgba(6,6,6,0.72) 0%,
      rgba(6,6,6,0.58) 40%,
      rgba(6,6,6,0.62) 70%,
      rgba(6,6,6,0.80) 100%
    );
  transition: background 0.6s ease;
}

.half--photo:hover .half__scrim {
  background:
    linear-gradient(180deg,
      rgba(6,6,6,0.65) 0%,
      rgba(6,6,6,0.48) 40%,
      rgba(6,6,6,0.52) 70%,
      rgba(6,6,6,0.72) 100%
    );
}

.half--photo:hover .half__bg img {
  transform: scale(1.03);
  filter: brightness(1.08);
}

.half--photo .half__bg img {
  transition: transform 1.2s var(--ease), filter 0.8s ease;
}

/* ============================================
   RIGHT HALF — DEVOPS (LIGHT)
   ============================================ */
.half--devops {
  background: var(--light-bg);
  color: var(--light-text);
}

/* Geometric dot pattern */
.half--devops .half__pattern {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0.06;
  background-image:
    radial-gradient(circle at 1px 1px, var(--light-text) 0.6px, transparent 0.6px);
  background-size: 20px 20px;
  transition: opacity 0.6s ease;
}

.half--devops:hover .half__pattern {
  opacity: 0.09;
}

/* Perspective grid lines */
.half--devops .half__lines {
  position: absolute;
  inset: -10%;
  z-index: 1;
  opacity: 0.04;
  background-image:
    linear-gradient(rgba(0,0,0,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.12) 1px, transparent 1px);
  background-size: 60px 60px;
  transform: perspective(800px) rotateX(35deg);
  transform-origin: center 80%;
  transition: opacity 0.6s ease;
}

.half--devops:hover .half__lines {
  opacity: 0.065;
}

/* Decorative code watermark on devops side */
.half--devops .half__code {
  position: absolute;
  bottom: 12%;
  right: 8%;
  z-index: 2;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  line-height: 1.9;
  color: var(--light-text);
  opacity: 0.06;
  text-align: right;
  white-space: pre;
  pointer-events: none;
  transition: opacity 0.6s ease;
}

.half--devops:hover .half__code {
  opacity: 0.10;
}

/* Accent geometric element */
.half--devops .half__geo {
  position: absolute;
  top: 18%;
  left: 12%;
  z-index: 2;
  width: 80px;
  height: 80px;
  border: 1px solid var(--accent);
  opacity: 0.06;
  transform: rotate(45deg);
  pointer-events: none;
  transition: opacity 0.6s ease, transform 0.8s var(--ease);
}

.half--devops:hover .half__geo {
  opacity: 0.12;
  transform: rotate(48deg);
}

/* ============================================
   TYPOGRAPHY WITHIN HALVES
   ============================================ */
.half__label {
  font-family: var(--sans);
  font-size: 0.58rem;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  margin-bottom: 2rem;
  opacity: 0;
  transform: translateY(12px);
}

.half--photo .half__label {
  color: var(--accent);
}

.half--devops .half__label {
  color: var(--accent);
}

.half__title {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(3.2rem, 6.5vw, 6.5rem);
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 1.4rem;
  opacity: 0;
  transform: translateY(20px);
}

.half__tagline {
  font-family: var(--sans);
  font-size: 0.7rem;
  font-weight: 300;
  letter-spacing: 0.15em;
  opacity: 0;
  transform: translateY(10px);
}

.half--photo .half__tagline {
  color: var(--dark-text-dim);
}

.half--devops .half__tagline {
  color: var(--light-text-dim);
}

/* Arrow indicator */
.half__arrow {
  position: absolute;
  bottom: clamp(2rem, 4vh, 3.5rem);
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.4s var(--ease);
}

.half__arrow svg {
  width: 20px;
  height: 20px;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

.half--photo .half__arrow svg {
  stroke: var(--dark-text-dim);
}

.half--devops .half__arrow svg {
  stroke: var(--light-text-dim);
}

.half:hover .half__arrow {
  opacity: 1;
  transform: translateX(-50%) translateX(4px);
}

/* Hover scale on inner content */
.half__inner {
  transition: transform 0.8s var(--ease);
}

.half:hover .half__inner {
  transform: scale(1.02);
}

/* ============================================
   CENTER NAME — overlapping both halves
   ============================================ */
.center-name {
  position: absolute;
  top: clamp(2rem, 5vh, 4rem);
  left: 50%;
  transform: translateX(-50%);
  z-index: 60;
  text-align: center;
  pointer-events: none;
  white-space: nowrap;
}

.center-name__text {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(0.85rem, 1.4vw, 1.1rem);
  letter-spacing: 0.35em;
  text-transform: uppercase;
  /* Split color effect: left dark text, right dark text —
     using a blended neutral that reads on both sides */
  color: var(--accent);
  opacity: 0;
  transform: translateY(-8px);
}

.center-name__rule {
  width: 32px;
  height: 1px;
  background: var(--accent);
  margin: 0.6rem auto 0;
  transform-origin: center;
  opacity: 0;
  transform: scaleX(0);
}

/* ============================================
   CENTER DIVIDER LINE
   ============================================ */
.divider {
  position: absolute;
  top: 0;
  left: 50%;
  width: 1px;
  height: 100%;
  z-index: 55;
  transform: translateX(-50%);
  overflow: hidden;
}

.divider__line {
  width: 100%;
  height: 100%;
  background: linear-gradient(
    180deg,
    transparent 0%,
    transparent 18%,
    var(--accent) 35%,
    var(--accent) 85%,
    transparent 100%
  );
  opacity: 0.18;
  transform: scaleY(0);
  transform-origin: top;
}

/* ============================================
   ENTRANCE ANIMATIONS
   ============================================ */
.is-loaded .center-name__text {
  animation: fadeDown 1s 0.2s var(--ease) forwards;
}

.is-loaded .center-name__rule {
  animation: ruleGrow 0.6s 0.5s var(--ease) forwards;
}

.is-loaded .divider__line {
  animation: dividerReveal 1.2s 0.1s var(--ease) forwards;
}

/* Left half — staggered */
.is-loaded .half--photo .half__label {
  animation: fadeUp 0.8s 0.4s var(--ease) forwards;
}

.is-loaded .half--photo .half__title {
  animation: fadeUp 0.9s 0.55s var(--ease) forwards;
}

.is-loaded .half--photo .half__tagline {
  animation: fadeUp 0.8s 0.7s var(--ease) forwards;
}

/* Right half — slightly later stagger */
.is-loaded .half--devops .half__label {
  animation: fadeUp 0.8s 0.5s var(--ease) forwards;
}

.is-loaded .half--devops .half__title {
  animation: fadeUp 0.9s 0.65s var(--ease) forwards;
}

.is-loaded .half--devops .half__tagline {
  animation: fadeUp 0.8s 0.8s var(--ease) forwards;
}

/* Arrow fade-in after content */
.is-loaded .half__arrow {
  animation: fadeIn 0.6s 1.2s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  to { opacity: 0.6; }
}

@keyframes ruleGrow {
  to { opacity: 1; transform: scaleX(1); }
}

@keyframes dividerReveal {
  to { transform: scaleY(1); }
}

@keyframes loaderPulse {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 1; }
}

/* ============================================
   RESPONSIVE — MOBILE STACK
   ============================================ */
@media (max-width: 768px) {
  .split {
    flex-direction: column;
  }

  .half {
    width: 100%;
    height: 50vh;
    height: 50svh;
  }

  .half__title {
    font-size: clamp(2.2rem, 9vw, 3.5rem);
  }

  .half__label {
    margin-bottom: 1.2rem;
    font-size: 0.52rem;
  }

  .half__tagline {
    font-size: 0.62rem;
  }

  /* Reposition center name for stacked layout */
  .center-name {
    top: auto;
    bottom: auto;
    /* Position at the junction of the two halves */
    top: 50%;
    transform: translate(-50%, -50%);
  }

  .center-name__text {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    /* Add background pill for readability at junction */
    background: rgba(6,6,6,0.65);
    padding: 0.6rem 1.2rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(139,111,78,0.15);
  }

  .center-name__rule {
    display: none;
  }

  /* Divider becomes horizontal */
  .divider {
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    transform: translateY(-50%);
  }

  .divider__line {
    background: linear-gradient(
      90deg,
      transparent 0%,
      var(--accent) 15%,
      var(--accent) 85%,
      transparent 100%
    );
    transform: scaleX(0);
    transform-origin: left;
  }

  .is-loaded .divider__line {
    animation: dividerRevealH 1.2s 0.1s var(--ease) forwards;
  }

  @keyframes dividerRevealH {
    to { transform: scaleX(1); }
  }

  .half__arrow {
    bottom: 1.5rem;
  }

  /* Adjust hover states for touch */
  .half:hover .half__inner {
    transform: none;
  }

  .half:active .half__inner {
    transform: scale(0.98);
  }
}

@media (max-width: 480px) {
  .half__title {
    font-size: clamp(1.8rem, 10vw, 2.8rem);
  }

  .center-name__text {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
  }
}

/* ============================================
   PREFERS REDUCED MOTION
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>

<noscript><style>.loader{display:none!important}.half__label,.half__title,.half__tagline{opacity:1!important;transform:none!important}.center-name__text{opacity:1!important;transform:none!important}.center-name__rule{opacity:1!important;transform:scaleX(1)!important}.divider__line{transform:scaleY(1)!important}</style></noscript>

<!-- Loader -->
<div class="loader" id="loader">

</div>

<!-- Film grain overlay -->
<div class="grain"></div>

<!-- Center name -->
<div class="center-name">

</div>

<!-- Center divider -->
<div class="divider">
  <div class="divider__line"></div>
</div>

<!-- ======== SPLIT CONTAINER ======== -->
<div class="split">

  <!-- LEFT: Photography -->
  <a href="photography.html" class="half half--photo">
    <div class="half__bg">
      <img src="photos/vietnam/DSC_1190.jpg" alt="" loading="eager">
    </div>

      <p class="half__label">01 &mdash; Portfolio</p>

    </div>
    <div class="half__arrow">

      </svg>

  <a href="devops.html" class="half half--devops">

    <div class="half__code">apiVersion: apps/v1
kind: Deployment

    <div class="half__inner">
      <p class="half__label">02 &mdash; Experience</p>

</div>

<script>
(function() {
  'use strict';

  // ==========================================
  // LOADER — wait for hero image
  // ==========================================
  var loaderEl = document.getElementById('loader');
  var heroImg = document.querySelector('.half--photo .half__bg img');
  var loaded = false;

  function hideLoader() {
    if (loaded) return;
    loaded = true;
    loaderEl.classList.add('is-hidden');
    document.body.classList.add('is-loaded');
  }

  if (heroImg) {
    if (heroImg.complete && heroImg.naturalWidth > 0) {
      // Already cached
      setTimeout(hideLoader, 200);
    } else {
      heroImg.addEventListener('load', function() {
        setTimeout(hideLoader, 100);
      });
      heroImg.addEventListener('error', hideLoader);
    }
  }

  // Safety fallback — never wait more than 3s
  setTimeout(hideLoader, 3000);


})();
</script>
